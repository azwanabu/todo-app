<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#F97316"/>
  <!-- Clipboard body -->
  <rect x="7" y="9" width="18" height="20" rx="2" fill="white"/>
  <!-- Clipboard top clip -->
  <rect x="12" y="6" width="8" height="5" rx="2" fill="#EA580C"/>
  <!-- Check line 1 -->
  <polyline points="11,15 13,17 17,13" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line 1 text -->
  <rect x="18" y="14" width="5" height="1.5" rx="0.75" fill="#D1D5DB"/>
  <!-- Check line 2 -->
  <polyline points="11,20 13,22 17,18" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line 2 text -->
  <rect x="18" y="19" width="5" height="1.5" rx="0.75" fill="#D1D5DB"/>
  <!-- Line 3 (unchecked) -->
  <rect x="11" y="24" width="2" height="2" rx="0.5" fill="#E5E7EB"/>
  <rect x="14" y="24.25" width="9" height="1.5" rx="0.75" fill="#D1D5DB"/>
</svg>
